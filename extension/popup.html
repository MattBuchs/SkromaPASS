<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>SkromaPASS</title>
		<link rel="stylesheet" href="src/popup/popup.css" />
	</head>
	<body>
		<!-- SVG sprite -->
		<svg xmlns="http://www.w3.org/2000/svg" style="display: none">
			<symbol
				id="ico-key"
				viewBox="0 0 24 24"
				fill="none"
				stroke="currentColor"
				stroke-width="2"
				stroke-linecap="round"
				stroke-linejoin="round"
			>
				<path
					d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"
				/>
			</symbol>
			<symbol
				id="ico-lock"
				viewBox="0 0 24 24"
				fill="none"
				stroke="currentColor"
				stroke-width="2"
				stroke-linecap="round"
				stroke-linejoin="round"
			>
				<rect x="3" y="11" width="18" height="11" rx="2" />
				<path d="M7 11V7a5 5 0 0 1 10 0v4" />
			</symbol>
			<symbol
				id="ico-dice"
				viewBox="0 0 24 24"
				fill="none"
				stroke="currentColor"
				stroke-width="2"
				stroke-linecap="round"
				stroke-linejoin="round"
			>
				<rect x="2" y="2" width="20" height="20" rx="5" />
				<circle
					cx="8.5"
					cy="8.5"
					r="1.5"
					fill="currentColor"
					stroke="none"
				/>
				<circle
					cx="15.5"
					cy="8.5"
					r="1.5"
					fill="currentColor"
					stroke="none"
				/>
				<circle
					cx="15.5"
					cy="15.5"
					r="1.5"
					fill="currentColor"
					stroke="none"
				/>
				<circle
					cx="8.5"
					cy="15.5"
					r="1.5"
					fill="currentColor"
					stroke="none"
				/>
				<circle
					cx="12"
					cy="12"
					r="1.5"
					fill="currentColor"
					stroke="none"
				/>
			</symbol>
			<symbol
				id="ico-save"
				viewBox="0 0 24 24"
				fill="none"
				stroke="currentColor"
				stroke-width="2"
				stroke-linecap="round"
				stroke-linejoin="round"
			>
				<path
					d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"
				/>
				<polyline points="17 21 17 13 7 13 7 21" />
				<polyline points="7 3 7 8 15 8" />
			</symbol>
			<symbol
				id="ico-sparkle"
				viewBox="0 0 24 24"
				fill="none"
				stroke="currentColor"
				stroke-width="2"
				stroke-linecap="round"
				stroke-linejoin="round"
			>
				<path
					d="M12 2l2.4 7.6H22l-6.2 4.5 2.4 7.5L12 17l-6.2 4.6 2.4-7.5L2 9.6h7.6L12 2z"
				/>
			</symbol>
			<symbol
				id="ico-copy"
				viewBox="0 0 24 24"
				fill="none"
				stroke="currentColor"
				stroke-width="2"
				stroke-linecap="round"
				stroke-linejoin="round"
			>
				<rect x="9" y="9" width="13" height="13" rx="2" />
				<path
					d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
				/>
			</symbol>
			<symbol
				id="ico-refresh"
				viewBox="0 0 24 24"
				fill="none"
				stroke="currentColor"
				stroke-width="2"
				stroke-linecap="round"
				stroke-linejoin="round"
			>
				<polyline points="23 4 23 10 17 10" />
				<path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
			</symbol>
			<symbol
				id="ico-user"
				viewBox="0 0 24 24"
				fill="none"
				stroke="currentColor"
				stroke-width="2"
				stroke-linecap="round"
				stroke-linejoin="round"
			>
				<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
				<circle cx="12" cy="7" r="4" />
			</symbol>
			<symbol
				id="ico-eye"
				viewBox="0 0 24 24"
				fill="none"
				stroke="currentColor"
				stroke-width="2"
				stroke-linecap="round"
				stroke-linejoin="round"
			>
				<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
				<circle cx="12" cy="12" r="3" />
			</symbol>
			<symbol
				id="ico-external"
				viewBox="0 0 24 24"
				fill="none"
				stroke="currentColor"
				stroke-width="2"
				stroke-linecap="round"
				stroke-linejoin="round"
			>
				<path
					d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"
				/>
				<polyline points="15 3 21 3 21 9" />
				<line x1="10" y1="14" x2="21" y2="3" />
			</symbol>
			<symbol
				id="ico-logout"
				viewBox="0 0 24 24"
				fill="none"
				stroke="currentColor"
				stroke-width="2"
				stroke-linecap="round"
				stroke-linejoin="round"
			>
				<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
				<polyline points="16 17 21 12 16 7" />
				<line x1="21" y1="12" x2="9" y2="12" />
			</symbol>
			<symbol
				id="ico-keyboard"
				viewBox="0 0 24 24"
				fill="none"
				stroke="currentColor"
				stroke-width="2"
				stroke-linecap="round"
				stroke-linejoin="round"
			>
				<rect x="2" y="6" width="20" height="12" rx="2" />
				<path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M8 14h8" />
			</symbol>
		</svg>

		<div class="header">
			<h1>
				<svg width="22" height="22" style="vertical-align: -4px">
					<use href="#ico-key" />
				</svg>
				SkromaPASS
			</h1>
			<p id="header-subtitle">Password Manager</p>
		</div>

		<div class="container">
			<!-- Section de connexion -->
			<div id="auth-container" class="auth-container active">
				<div
					id="error-message"
					class="error"
					style="display: none"
				></div>

				<button id="login-via-site-btn" class="btn btn-primary">
					Sign in via website
				</button>

				<p
					style="
						margin-top: 16px;
						text-align: center;
						font-size: 13px;
						color: #666;
					"
				>
					Open the SkromaPASS website to sign in, the extension will
					sync automatically
				</p>
			</div>

			<!-- Section principale (aprÃ¨s connexion) -->
			<div id="main-container" class="main-container">
				<div class="user-info">
					<div class="name" id="user-name"></div>
					<div class="email" id="user-email"></div>
				</div>

				<!-- Navigation par onglets -->
				<div class="tab-nav">
					<button id="tab-vault-btn" class="tab-btn tab-active">
						<svg width="14" height="14">
							<use href="#ico-lock" />
						</svg>
						Vault
					</button>
					<button id="tab-generator-btn" class="tab-btn">
						<svg width="14" height="14">
							<use href="#ico-dice" />
						</svg>
						Generator
					</button>
				</div>

				<div
					id="success-message"
					class="success"
					style="display: none"
				></div>

				<!-- ===================== ONGLET COFFRE ===================== -->
				<div id="tab-vault">
					<div class="passwords-section">
						<div class="section-header">
							Passwords for this site
						</div>
						<div id="passwords-list" class="password-list">
							<div class="loading">
								<div class="spinner"></div>
								<p>Loading...</p>
							</div>
						</div>
					</div>

					<!-- Section pour enregistrer le dernier mot de passe -->
					<div
						id="save-last-password-section"
						class="passwords-section"
						style="margin-top: 16px; display: none"
					>
						<div class="section-header">
							<svg width="14" height="14">
								<use href="#ico-save" />
							</svg>
							Save this password?
						</div>
						<div
							style="
								padding: 16px;
								background: #f0fdfa;
								border-radius: 8px;
							"
						>
							<div
								style="
									margin-bottom: 12px;
									font-size: 13px;
									color: #0f766e;
								"
							>
								<strong id="last-form-domain"></strong>
							</div>
							<div
								style="
									margin-bottom: 12px;
									font-size: 12px;
									color: #666;
								"
							>
								Username:
								<strong id="last-form-username"></strong>
							</div>
							<input
								type="text"
								id="last-form-name"
								placeholder="Password name"
								style="
									width: 100%;
									padding: 8px;
									border: 1px solid #14b8a6;
									border-radius: 6px;
									margin-bottom: 12px;
									font-size: 13px;
								"
							/>
							<div style="display: flex; gap: 8px">
								<button
									id="save-last-password-btn"
									class="btn btn-primary"
									style="
										flex: 1;
										padding: 8px;
										font-size: 13px;
									"
								>
									Save
								</button>
								<button
									id="dismiss-last-password-btn"
									class="btn btn-secondary"
									style="
										flex: 1;
										padding: 8px;
										font-size: 13px;
									"
								>
									Dismiss
								</button>
							</div>
						</div>
					</div>

					<div class="passwords-section" style="margin-top: 16px">
						<div class="section-header">
							<svg width="14" height="14">
								<use href="#ico-keyboard" />
							</svg>
							Button Settings
						</div>
						<div style="padding: 16px">
							<div class="form-group" style="margin-bottom: 0">
								<label
									style="
										display: flex;
										align-items: center;
										gap: 8px;
										cursor: pointer;
									"
								>
									<input
										type="checkbox"
										id="signup-btn-enabled"
										style="width: auto; cursor: pointer"
										checked
									/>
									<span style="font-size: 14px"
										>Show generator button (signup)</span
									>
								</label>
							</div>
							<div class="form-group" style="margin-bottom: 12px">
								<label
									style="
										display: flex;
										align-items: center;
										gap: 8px;
										cursor: pointer;
									"
								>
									<input
										type="checkbox"
										id="button-enabled"
										style="width: auto; cursor: pointer"
										checked
									/>
									<span style="font-size: 14px"
										>Show autofill button (login)</span
									>
								</label>
							</div>
							<div class="form-group" style="margin-bottom: 0">
								<label
									style="
										display: flex;
										align-items: center;
										gap: 8px;
										cursor: pointer;
									"
								>
									<input
										type="checkbox"
										id="auto-submit-enabled"
										style="width: auto; cursor: pointer"
										checked
									/>
									<span style="font-size: 14px"
										>Auto-submit after autofill</span
									>
								</label>
							</div>
						</div>
					</div>

					<!-- Section raccourcis clavier -->
					<div class="passwords-section" style="margin-top: 16px">
						<div class="section-header">
							<svg width="14" height="14">
								<use href="#ico-keyboard" />
							</svg>
							Keyboard Shortcuts
						</div>
						<div style="padding: 14px 16px">
							<div style="margin-bottom: 10px">
								<label
									style="
										font-size: 12px;
										font-weight: 500;
										color: #666;
										display: block;
										margin-bottom: 5px;
									"
									>Open popup</label
								>
								<div style="display: flex; gap: 6px">
									<input
										type="text"
										id="shortcut-open"
										class="shortcut-input"
										readonly
										placeholder="Click to capture..."
									/>
									<button
										id="shortcut-open-save"
										class="btn btn-primary"
										style="
											width: auto;
											padding: 6px 10px;
											margin: 0;
											font-size: 12px;
										"
									>
										Save
									</button>
								</div>
							</div>
							<div>
								<label
									style="
										font-size: 12px;
										font-weight: 500;
										color: #666;
										display: block;
										margin-bottom: 5px;
									"
									>Autofill page</label
								>
								<div style="display: flex; gap: 6px">
									<input
										type="text"
										id="shortcut-fill"
										class="shortcut-input"
										readonly
										placeholder="Click to capture..."
									/>
									<button
										id="shortcut-fill-save"
										class="btn btn-primary"
										style="
											width: auto;
											padding: 6px 10px;
											margin: 0;
											font-size: 12px;
										"
									>
										Save
									</button>
								</div>
							</div>
						</div>
					</div>
				</div>

				<!-- ===================== ONGLET GÉNÉRATEUR ===================== -->
				<div id="tab-generator" style="display: none">
					<div class="passwords-section">
						<div class="section-header">
							<svg width="14" height="14">
								<use href="#ico-sparkle" />
							</svg>
							Generated password
						</div>
						<div style="padding: 16px">
							<!-- Affichage du mot de passe -->
							<div
								style="
									display: flex;
									gap: 8px;
									margin-bottom: 10px;
								"
							>
								<input type="text" id="gen-password" readonly />
								<button
									id="gen-copy-btn"
									class="btn btn-primary"
									style="
										width: auto;
										padding: 10px 14px;
										margin: 0;
									"
									title="Copier"
								>
									<svg width="18" height="18">
										<use href="#ico-copy" />
									</svg>
								</button>
							</div>

							<!-- Barre de force -->
							<div
								style="
									height: 6px;
									background: #e0e0e0;
									border-radius: 3px;
									overflow: hidden;
									margin-bottom: 6px;
								"
							>
								<div
									id="gen-strength-bar"
									style="
										height: 100%;
										border-radius: 3px;
										transition: all 0.3s;
										width: 0;
									"
								></div>
							</div>
							<div
								id="gen-strength-label"
								style="
									font-size: 12px;
									color: #999;
									margin-bottom: 14px;
									text-align: center;
								"
							></div>

							<!-- Longueur -->
							<div style="margin-bottom: 14px">
								<div
									style="
										display: flex;
										justify-content: space-between;
										margin-bottom: 6px;
									"
								>
									<label
										style="
											font-size: 13px;
											font-weight: 500;
											color: #333;
										"
										>Length</label
									>
									<span
										id="gen-length-display"
										style="
											font-size: 13px;
											font-weight: 700;
											color: #14b8a6;
										"
										>16</span
									>
								</div>
								<input
									type="range"
									id="gen-length"
									min="8"
									max="64"
									value="16"
								/>
							</div>

							<!-- Options -->
							<div
								style="
									display: grid;
									grid-template-columns: 1fr 1fr;
									gap: 8px;
									margin-bottom: 14px;
								"
							>
								<label class="gen-option"
									><input
										type="checkbox"
										id="gen-uppercase"
										checked
									/>
									Uppercase (A-Z)</label
								>
								<label class="gen-option"
									><input
										type="checkbox"
										id="gen-digits"
										checked
									/>
									Digits (0-9)</label
								>
								<label class="gen-option"
									><input
										type="checkbox"
										id="gen-symbols"
										checked
									/>
									Symbols (!@#…)</label
								>
								<label class="gen-option"
									><input type="checkbox" id="gen-readable" />
									Readable (no 0,O,l)</label
								>
							</div>

							<button
								id="gen-refresh-btn"
								class="btn btn-secondary"
								style="margin: 0"
							>
								<svg width="14" height="14">
									<use href="#ico-refresh" />
								</svg>
								Regenerate
							</button>
							<button
								id="gen-use-btn"
								class="btn btn-primary"
								style="margin: 8px 0 0 0; display: none"
							>
								<svg width="14" height="14">
									<use href="#ico-save" />
								</svg>
								Use this password
							</button>
						</div>
					</div>
				</div>

				<div class="footer-links">
					<button id="open-app-btn" class="btn btn-secondary">
						<svg width="13" height="13">
							<use href="#ico-external" />
						</svg>
						Open website
					</button>
					<button
						id="logout-btn"
						class="btn btn-secondary logout-btn"
					>
						<svg width="13" height="13">
							<use href="#ico-logout" />
						</svg>
						Sign out
					</button>
				</div>
			</div>
		</div>

		<script src="src/popup/popup-utils.js"></script>
		<script src="src/popup/popup-passwords.js"></script>
		<script src="src/popup/popup-settings.js"></script>
		<script src="src/popup/popup-generator.js"></script>
		<script src="src/popup/popup-shortcuts.js"></script>
		<script src="src/popup/popup-auth.js"></script>
		<script src="popup.js"></script>
	</body>
</html>
